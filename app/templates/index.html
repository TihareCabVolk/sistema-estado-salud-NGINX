<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Central - Estado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="tarjeta-principal bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-4">🏥 Hospital Central</h1>
        <p class="text-gray-600 mb-6">Monitor de Disponibilidad en Tiempo Real</p>
        
        <div id="status-card" class="bg-green-100 border-l-4 border-green-500 p-4 mb-6 transition-colors duration-300">
            <h2 class="text-2xl font-bold text-green-700" id="cupos-texto">Cargando...</h2>
            <p class="text-sm text-green-600 mt-1">Cupos disponibles</p>
        </div>

        <button onclick="hacerReserva()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded transition duration-200 shadow-md mb-4">
            Tomar Cupo de Emergencia
        </button>

        <button onclick="cancelarReserva()" class="w-full bg-red-400 hover:bg-red-500 text-white font-bold py-3 px-4 rounded transition duration-200 shadow-md">
            Cancelar Reserva
        </button>

        <div class="mt-8 text-xs text-gray-400 bg-gray-50 p-2 rounded">
            <p>Atendido por: <span id="nodo-texto" class="font-mono text-gray-600">...</span></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
